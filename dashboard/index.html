<!DOCTYPE html>
<html>

<head>

<title>JARVIS</title>

<style>

body{
background:black;
color:#00ffff;
font-family:monospace;
}

.logo{
font-size:40px;
text-align:center;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{opacity:0.5}

50%{opacity:1}

100%{opacity:0.5}

}

.panel{
border:1px solid cyan;
padding:20px;
margin:20px;
}

</style>

</head>

<body>

<div class="logo">

JARVIS AI OS

</div>

<div class="panel">

System Status: ONLINE

</div>

<div class="panel">

Market Intelligence: ACTIVE

</div>

<div class="panel">

Strategic Council: READY

</div>

</body>

</html>
