<script>
const qs = (id) => document.getElementById(id);

async function safeFetch(url, options={}){
  try{
    const res = await fetch(url, options);
    return await res.json();
  }catch(e){
    console.warn("Fetch error:", url, e);
    return {};
  }
}

async function loadHome(){
  const data = await safeFetch("/dashboard/home");

  qs("greeting").textContent = data.greeting || "JARVIS ready";
  qs("todayDate").textContent = data.date || "--";
  qs("topPriority").textContent = data.top_priority || "-";
  qs("tasksOpen").textContent = data.tasks_open || 0;
  qs("assetsCount").textContent = data.assets_count || 0;

  if(data.next_meeting){
    qs("nextMeeting").textContent =
      data.next_meeting.time + " • " + data.next_meeting.title;
  } else {
    qs("nextMeeting").textContent = "No meetings";
  }
}

async function loadSystemMetrics(){
  const data = await safeFetch("/dashboard/system");

  qs("signalsCount").textContent = data.signals || "--";
  qs("accuracy").textContent = data.accuracy || "--";
  qs("riskLevel").textContent = data.risk || "--";
  qs("exposure").textContent = data.exposure || "--";
}

async function loadAgents(){
  const data = await safeFetch("/dashboard/agents");

  const box = qs("agentStatus");
  if(!box) return;

  box.innerHTML = "";

  (data.items || []).forEach(a=>{
    const div = document.createElement("div");
    div.className = "brief";
    div.innerHTML = <strong></strong> • ;
    box.appendChild(div);
  });
}

async function analyzeTrader(){
  const symbol = qs("symbolInput").value || "AAPL";

  const data = await safeFetch("/dashboard/trader", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({symbol})
  });

  qs("traderSymbol").textContent = data.symbol || symbol;
  qs("setupScore").textContent = data.setup_score || "--";
  qs("priceNow").textContent = data.price_now || "--";
}

async function loadRecommendations(){
  const data = await safeFetch("/dashboard/recommendations");

  const box = qs("recommendations");
  if(!box) return;

  box.innerHTML = "";

  (data.items || []).forEach(i=>{
    const div = document.createElement("div");
    div.className = "brief";
    div.innerHTML = <strong></strong> • Score: ;
    box.appendChild(div);
  });
}

async function boot(){
  await loadHome();
  await loadSystemMetrics();
  await loadAgents();
  await analyzeTrader();
  await loadRecommendations();
}

boot();
</script>
